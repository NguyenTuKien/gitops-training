apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: birdnet-market
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  description: Project birdnet-market (apps/birdnet-market/)
  sourceRepos:
    # base chart + values cùng nằm trong repo này
    - https://github.com/ongtungduong/gitops-training.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: "birdnet-market-*"
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
