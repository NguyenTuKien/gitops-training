apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: mention-mate
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  description: Project mention-mate (branch project-mention-mate)
  sourceRepos:
    # base chart + values cùng nằm trong repo này
    - https://github.com/ongtungduong/gitops-training.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: "mention-mate-*"
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
