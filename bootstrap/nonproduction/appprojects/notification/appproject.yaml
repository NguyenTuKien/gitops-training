apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: notification
  namespace: argocd
spec:
  description: Project notification (apps/notification/)
  sourceRepos:
    - https://github.com/NguyenTuKien/gitops-training.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: "notification-*"
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
