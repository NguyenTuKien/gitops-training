# mention-mate-app — prod | image test nhẹ: traefik/whoami — backend + worker + scheduler
components:
  backend:
    image: { repository: traefik/whoami, tag: "v1.10.3" }
    replicaCount: 3
    port: 80
    httpRoute:
      enabled: true
      hostnames: ["mention-mate-app-prod.duongot.work"]
      pathPrefixes: ["/api"]
  worker:
    image: { repository: traefik/whoami, tag: "v1.10.3" }
    replicaCount: 3
  scheduler:
    image: { repository: traefik/whoami, tag: "v1.10.3" }
    replicaCount: 2
    env:
      SCHEDULE_INTERVAL: "30s"
sealedSecret:
  enabled: false        # repo test: bỏ secret để pod chạy ngay (không cần kubeseal)
