# Gateway RIÊNG cho ArgoCD UI (tách khỏi shared-gw của app).
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: argocd-gw
  namespace: kgateway-system
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  gatewayClassName: kgateway
  infrastructure:
    parametersRef:
      group: gateway.kgateway.dev
      kind: GatewayParameters
      name: argocd-gw-params
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: argocd.duongot.work
      allowedRoutes:
        namespaces:
          from: All
