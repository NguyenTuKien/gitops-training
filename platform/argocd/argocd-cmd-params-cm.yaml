# Bật ArgoCD server chạy HTTP (insecure) để route qua gateway cổng 80.
# Server-Side Apply -> chỉ set key server.insecure, không xoá các key khác do bản cài đặt giữ.
# LƯU Ý: argocd-server đọc param lúc khởi động -> cần restart 1 lần để có hiệu lực.
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cmd-params-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cmd-params-cm
    app.kubernetes.io/part-of: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  server.insecure: "true"
