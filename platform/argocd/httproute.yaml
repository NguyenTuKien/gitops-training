# argocd.duongot.work -> argocd-server (qua argocd-gw).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  parentRefs:
    - name: argocd-gw
      namespace: kgateway-system
  hostnames:
    - argocd.duongot.work
  rules:
    - backendRefs:
        - name: argocd-server
          port: 80
