# Expose ArgoCD UI qua Gateway dùng chung: argocd.duongot.work -> service argocd-server.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  parentRefs:
    - name: shared-gw
      namespace: kgateway-system
  hostnames: ["argocd.duongot.work"]
  rules:
    - backendRefs:
        - name: argocd-server
          port: 80
