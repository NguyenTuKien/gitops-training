{{- $fullname := include "app.fullname" . -}}
{{- range $name, $c := .Values.components }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-{{ $name }}
  labels:
    {{- include "app.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
spec:
  replicas: {{ $c.replicaCount | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ $.Release.Name }}
      app.kubernetes.io/component: {{ $name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $.Chart.Name }}
        app.kubernetes.io/instance: {{ $.Release.Name }}
        app.kubernetes.io/component: {{ $name }}
      {{- with $c.config }}
      annotations:
        # đổi config -> checksum đổi -> pod tự rollout
        checksum/config: {{ . | toYaml | sha256sum }}
      {{- end }}
    spec:
      containers:
        - name: {{ $name }}
          image: "{{ $c.image.repository }}:{{ $c.image.tag }}"
          imagePullPolicy: {{ $c.image.pullPolicy | default "IfNotPresent" }}
          {{- with $c.port }}
          ports:
            - containerPort: {{ . }}
          {{- end }}
          {{- with $c.env }}
          env:
            {{- range $k, $v := . }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          {{- end }}
          {{- if $.Values.sealedSecret.enabled }}
          envFrom:
            - secretRef:
                name: {{ $fullname }}-secret
          {{- end }}
          {{- with $c.config }}
          volumeMounts:
            - name: config
              mountPath: {{ .mountPath | default "/app/config" }}
              readOnly: true
          {{- end }}
          resources:
            {{- toYaml ($c.resources | default dict) | nindent 12 }}
      {{- with $c.config }}
      volumes:
        - name: config
          configMap:
            name: {{ $fullname }}-{{ $name }}-config
      {{- end }}
{{- end }}
